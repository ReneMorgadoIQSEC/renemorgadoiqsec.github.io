<app-header></app-header>
<main class="Dashboard">
  <section class="Dashboard__content">
    <app-title-export [data]="tableData"></app-title-export>
    <app-filter-form (onFilterSearch)="onFilterSearch($event)"></app-filter-form>
    <app-table [data]="tableData" [alreadySearched]="alreadySearched" (onDataSelected)="onDataSelected($event)"
      (searchAllData)="onSearchAllData()"></app-table>
    <app-user-detail [showModal]="showModal" (onCloseModal)="closeModal()"
      [userSelected]="dataSelected"></app-user-detail>
    <app-pager [currentPage]="currentPage" [totalPages]="totalPages" (pageChange)="onPageChange($event)">
    </app-pager>
  </section>
</main>
