<app-header></app-header>
<main class="Dashboard">
  <section class="Dashboard__content">
    <app-title-export [totalData]="tableData()" [data]="paginatedData()"></app-title-export>
    <app-filter-form (onFilterSearch)="onFilterSearch($event)"></app-filter-form>
    <app-table [data]="paginatedData()" [alreadySearched]="alreadySearched" (onDataSelected)="onDataSelected($event)"
      (searchAllData)="onSearchAllData()"></app-table>
    <app-pager [currentPage]="currentPage() + 1" [totalPages]="totalPages()" (pageChange)="onPageChange($event)">
    </app-pager>
    @if (showModal()) {
      <app-user-detail [showModal]="showModal" (onCloseModal)="closeModal()"
        [userSelected]="dataSelected"></app-user-detail>
    }
  </section>
</main>
