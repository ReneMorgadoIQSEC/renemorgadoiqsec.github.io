<section class="login">
    <div class="login__content">
        <div>
            <app-input 
            formControlName="email" 
            variant="login" 
            type="email" 
            label="Usuario*" 
            [regex]="'[a-zA-Z0-9@._\\-]'">
            </app-input> 
        
            <app-input 
            formControlName="password" 
            variant="login" 
            type="password" 
            label="Contraseña*" 
            [maxLength]="20">
            </app-input>
        </div>
        <div>
            <app-input
            formControlName="busqueda"
            variant="filter"
            type="text"
            placeholder="Buscar por nombre, CURP, correo electrónico"
            icon="assets/find.svg">
            </app-input>
            <app-input
            formControlName="fechaInicio"
            variant="filter"
            type="date"
            placeholder="Fecha inicio">
            </app-input>
            <app-input
            formControlName="fechaFin"
            variant="filter"
            type="date"
            placeholder="Fecha fin">
            </app-input>
        </div>
        <button class="button button--primary" (click)="onButtonClick()">Login</button>
    </div>
</section>
