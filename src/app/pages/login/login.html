<section class="login">
    <form class="login__content">
        <app-input 
        formControlName="email" 
        variant="login" 
        type="email" 
        label="Usuario*" 
        [regex]="'[a-zA-Z0-9@._\\-]'">
        </app-input> 
    
        <app-input 
        formControlName="password" 
        variant="login" 
        type="password" 
        label="Contraseña*" 
        [maxLength]="20">
        </app-input>
        
        <button class="button button--primary" (click)="onButtonClick()">Login</button>
    </form>
</section>
