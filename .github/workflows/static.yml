name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build -- --base-href=/

      - name: Add GitHub Pages SPA fallback
        run: cp dist/mesa-conocer/browser/index.html dist/mesa-conocer/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/mesa-conocer/browser

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/deploy-pages@v4